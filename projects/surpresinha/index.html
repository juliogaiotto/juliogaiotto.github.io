<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresinha de Loterias | Julio Gaiotto</title>
    <link rel="stylesheet" href="../../assets/css/nukleo.css">
    <link rel="stylesheet" href="style-surpresinha.css">
</head>
<body>
    <header>
        <h1>Gerador Automático - Surpresinha</h1>
        <p>Gere seus números e organize sua lista de jogos.</p>
    </header>

    <main>
        <section class="gerador-container">
            <div id="resultado-atual" class="resultado-display">
                <span class="placeholder">Clique em Gerar</span>
            </div>
            
            <div class="controles-principais">
                <label for="qtd-numeros">Quantos números deseja sortear? (6 a 20):</label>
                <input type="number" id="qtd-numeros" value="6" min="6" max="20">
                <button id="btn-gerar-dinamico" class="btn-primario">Gerar Surpresinha</button>
                --
                <button id="btn-gerar" class="btn-primario">Gerar Novo Jogo</button>
                <button id="btn-salvar" class="btn-secundario" disabled>Salvar na Lista</button>
            </div>
        </section>

        <section class="lista-container">
            <h2>Meus Jogos Salvos</h2>
            <ul id="lista-jogos">
                </ul>
            
            <div class="acoes-lista">
                <button id="btn-imprimir" class="btn-util">Imprimir Lista</button>
                <button id="btn-baixar" class="btn-util">Baixar Arquivo .txt</button>
                <button id="btn-limpar-lista" class="btn-perigo">Limpar Tudo</button>
            </div>
        </section>
    </main>

    <script src="script-surpresinha.js"></script>
</body>
</html>
