<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name= "author" content="juliogaiotto.github.io">
    <meta name= "language" content="pt-BR">
    <meta name= "description" content="Gerador de senhas personalizadas">
    <meta name= "keywords" content="MyPassWord, gerador de senhas, senhas personalizadas, password generator" />
    <link rel= "icon" href="favicon.ico" type="image/x-icon">
    <title>MyPassWord - Gerador de Senhas</title>
    <link rel="stylesheet" href="assets/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="wrapper">
    
    <h1><img src="assets/favicon.png" alt="MyPassWord" width="31" height="31"/> MyPassWord</h1>
    <p>Gerador de Senhas Personalizadas</p>
    
    <hr/>

    <div class="form-group">
        <label>Opções da Senha:</label>
        <div class="checkbox-group flex-row">
            <div class="box">
                <label><input type="checkbox" id="chkUpper" checked> Letras Maiúsculas (A-Z)</label>
                <label><input type="checkbox" id="chkLower" checked> Letras Minúsculas (a-z)</label>
            </div>
            <div class="box">
                <label><input type="checkbox" id="chkNum" checked> Números (0-9)</label>
                <label><input type="checkbox" id="chkSpec" checked> Caracteres Especiais (!@#$%)</label>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>Tamanho da Senha:</label>
        <select id="selLength">
            <option value="6">6 caracteres</option>
            <option value="8">8 caracteres</option>
            <option value="10">10 caracteres</option>
            <option value="12" selected>12 caracteres</option>
            <option value="14">14 caracteres</option>
            <option value="18">18 caracteres</option>
        </select>
    </div>

    <div class="form-group">
        <label>Site / Sistema:</label>
        <input type="text" id="inputSite" placeholder="Ex: www.github.com" class="google-sans-code">
    </div>

    <div class="form-group">
        <label>Nome (Identificação/Login):</label>
        <input type="text" id="inputNome" placeholder="Ex: Meu Email Principal" class="google-sans-code">
    </div>

    <div class="form-group">
        <label>Senha Gerada:</label>
        <input type="text" id="inputSenha" placeholder="Clique em Gerar Senha" class="google-sans-code" style="border: 1px solid #4CAF50;">
    </div>

    <div class="btn-container">
        <button id="btnGerar">🗝️ Gerar Senha</button>
        <button id="btnSalvar" class="btn-secondary">💾 Download da Senha</button>
    </div>

    <div id="statusMessage"></div>

    <footer class="flex-row">
        <div class="box">            
             <a  class="btn" href="https://juliogaiotto.github.io/" target="_blank" rel="noopener noreferrer"><i class="fa-brands fa-square-github"></i> Meu GitHub</a>
        </div>
        <div class="box">
            <a class="btn" href="https://link.mercadopago.com.br/juliogaiotto"><i class="fa-solid fa-mug-hot"></i> Apoie-me</a>
            <!-- <a href="https://juliogaiotto.github.io/"><small>↩ Voltar para o perfil de Julio Gaiotto</small></a> -->
        </div>
        <div class="box">
        <span class="btn-fake">
            <small>
                Desenvolvido por <a href="https://juliogaiotto.github.io/" target="_blank" rel="noopener noreferrer">Julio Gaiotto</a> | &copy; 2024
            </small>
        </span>
        </div>
    </footer>
</div>

    <script src="assets/js/script.js"></script>
</body>
</html>
