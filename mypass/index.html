<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MyPass - Gerador de Senhas</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="wrapper">

    <h1>MyPass</h1>
    <p>Gerador de Senhas Personalizadas</p>
    
    <div class="form-group">
        <label>Nome (Identificação/Login):</label>
        <input type="text" id="inputNome" placeholder="Ex: Meu Email Principal">
    </div>
    <div class="form-group">
        <label>Site / Sistema:</label>
        <input type="text" id="inputSite" placeholder="Ex: www.github.com">
    </div>

    <div class="form-group">
        <label>Opções da Senha:</label>
        <div class="checkbox-group">
            <label><input type="checkbox" id="chkUpper" checked> Letras Maiúsculas (A-Z)</label>
            <label><input type="checkbox" id="chkLower" checked> Letras Minúsculas (a-z)</label>
            <label><input type="checkbox" id="chkNum" checked> Números (0-9)</label>
            <label><input type="checkbox" id="chkSpec" checked> Caracteres Especiais (!@#$%)</label>
        </div>
    </div>

    <div class="form-group">
        <label>Tamanho da Senha:</label>
        <select id="selLength">
            <option value="6">6 caracteres</option>
            <option value="8">8 caracteres</option>
            <option value="10">10 caracteres</option>
            <option value="12" selected>12 caracteres</option>
            <option value="14">14 caracteres</option>
            <option value="18">18 caracteres</option>
        </select>
    </div>

    <div class="form-group">
        <label>Senha Gerada:</label>
        <input type="text" id="inputSenha" placeholder="Clique em Gerar Senha">
    </div>

    <div class="btn-container">
        <button id="btnGerar" class="">Gerar Senha</button>
        <!-- <button id="btnSalvar">Salvar Senha</button> -->
    </div>

    <div id="statusMessage"></div>

    <div>
            <p class="view">
                <a href="../index.html"><small>↩️ Voltar para o perfil de Julio Gaiotto</small></a>
            </p>
    </div>
</div>

    <script src="assets/js/renderer.js"></script>
</body>
</html>
