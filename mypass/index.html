<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>MyPass - Gerador de Senhas</title>
    <style>
        /* Estilo inspirado no VS Code Dark Theme */
        body {
            background-color: #1e1e1e;
            color: #cccccc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            margin: 0;
        }
        h2 { color: #d4d4d4; font-weight: normal; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 13px; }
        input[type="text"] {
            width: 100%; padding: 8px; box-sizing: border-box;
            background-color: #3c3c3c; color: #cccccc;
            border: 1px solid #3c3c3c; border-radius: 2px;
            font-family: Consolas, 'Courier New', monospace;
        }
        input[type="text"]:focus { outline: 1px solid #007acc; border-color: transparent; }
        select {
            width: 100%; padding: 8px; background-color: #3c3c3c; color: #cccccc;
            border: 1px solid #3c3c3c; border-radius: 2px;
        }
        .checkbox-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
        .checkbox-group label { display: flex; align-items: center; cursor: pointer; font-size: 13px; }
        .checkbox-group input { margin-right: 8px; accent-color: #007acc; }
        .btn-container { display: flex; gap: 10px; margin-top: 20px; }
        button {
            flex: 1; padding: 10px; border: none; border-radius: 2px;
            background-color: #007acc; color: white; cursor: pointer;
            font-weight: bold; font-size: 13px;
        }
        button:hover { background-color: #005f9e; }
        .btn-secondary { background-color: #333333; border: 1px solid #007acc; }
        .btn-secondary:hover { background-color: #444444; }
        #statusMessage { margin-top: 15px; font-size: 12px; color: #4CAF50; }
    </style>
</head>
<body>
    <h2>MyPass</h2>
    
    <div class="form-group">
        <label>Nome (Identificação/Login):</label>
        <input type="text" id="inputNome" placeholder="Ex: Meu Email Principal">
    </div>
    <div class="form-group">
        <label>Site / Sistema:</label>
        <input type="text" id="inputSite" placeholder="Ex: www.github.com">
    </div>

    <div class="form-group">
        <label>Opções da Senha:</label>
        <div class="checkbox-group">
            <label><input type="checkbox" id="chkUpper" checked> Letras Maiúsculas (A-Z)</label>
            <label><input type="checkbox" id="chkLower" checked> Letras Minúsculas (a-z)</label>
            <label><input type="checkbox" id="chkNum" checked> Números (0-9)</label>
            <label><input type="checkbox" id="chkSpec" checked> Caracteres Especiais (!@#$%)</label>
        </div>
    </div>

    <div class="form-group">
        <label>Tamanho da Senha:</label>
        <select id="selLength">
            <option value="6">6 caracteres</option>
            <option value="8">8 caracteres</option>
            <option value="10">10 caracteres</option>
            <option value="12" selected>12 caracteres</option>
            <option value="14">14 caracteres</option>
            <option value="18">18 caracteres</option>
        </select>
    </div>

    <div class="form-group">
        <label>Senha Gerada:</label>
        <input type="text" id="inputSenha" placeholder="Clique em Gerar Senha">
    </div>

    <div class="btn-container">
        <button id="btnGerar" class="btn-secondary">Gerar Senha</button>
        <button id="btnSalvar">Salvar Senha</button>
    </div>

    <div id="statusMessage"></div>

    <script src="../dist/renderer.js"></script>
</body>
</html>
